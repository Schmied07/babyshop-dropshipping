# EuropaDrop — Stack de production (FastAPI + React). MongoDB = Atlas externe.
# Usage : cp .env.example .env  (éditez .env) puis :  docker compose up -d --build
# Premier admin (si base vide) :  docker compose exec backend python seed.py

version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: deploy/Dockerfile.backend
    container_name: europadrop-backend
    restart: unless-stopped
    env_file: .env
    expose:
      - "8001"            # interne au réseau docker (proxifié par le frontend)
    networks:
      - europadrop

  frontend:
    build:
      context: .
      dockerfile: deploy/Dockerfile.frontend
      args:
        REACT_APP_BACKEND_URL: ${REACT_APP_BACKEND_URL}
    container_name: europadrop-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      # Port 3000 = celui attendu par votre reverse-proxy existant (domaine + HTTPS).
      # Mettez "127.0.0.1:3000:80" si le proxy tourne sur la même machine.
      - "3000:80"
    networks:
      - europadrop

networks:
  europadrop:
    driver: bridge
