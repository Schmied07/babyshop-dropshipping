# Nginx de l'HÔTE (VPS) — termine le HTTPS et proxy vers la stack.
# À placer dans /etc/nginx/sites-available/europadrop puis :
#   sudo ln -s /etc/nginx/sites-available/europadrop /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d votre-domaine.com    # génère et branche le certificat TLS

server {
    listen 80;
    server_name votre-domaine.com;

    client_max_body_size 25M;

    # ROUTE A (Docker) : le conteneur frontend écoute sur 127.0.0.1:8080
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 120s;
    }

    # --- ROUTE B (sans Docker) : décommentez ces blocs à la place du location / ci-dessus ---
    # root /var/www/europadrop/build;   # résultat de `yarn build`
    # index index.html;
    # location /api/ {
    #     proxy_pass http://127.0.0.1:8001;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    #     proxy_set_header X-Forwarded-Host $host;
    # }
    # location / { try_files $uri /index.html; }
}
