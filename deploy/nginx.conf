# Nginx interne au conteneur frontend : sert le build React + proxy /api -> backend
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Uploads catalogue (CSV/XLSX) : autoriser des fichiers plus gros
    client_max_body_size 25M;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # API -> conteneur backend (nom de service docker-compose : "backend")
    location /api/ {
        proxy_pass http://backend:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 120s;
    }

    # SPA React : tout le reste renvoie index.html
    location / {
        try_files $uri /index.html;
    }
}
